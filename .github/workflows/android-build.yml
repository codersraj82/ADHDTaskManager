name: GitHub Actions Android Build
on:
  push:
    branches: [ main ] # Or "master" if that's your branch name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Expo CLI & Dependencies
        run: |
          npm install -g expo-cli
          npm install

      - name: 5. Prebuild Android Folder
        run: npx expo prebuild --platform android

      - name: 6. Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 7. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdhdApp-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk