name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 6. Bundle JavaScript (The "Standalone" Fix)
        # This command bakes the 'brain' of your app into the APK
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --dest android/app/src/main/assets

      - name: 7. Build Standalone Release APK
        run: |
          cd android
          chmod +x gradlew
          # This builds a Release APK signed with a debug key so you can install it
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug

      - name: 8. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: ADHD-Manager-Standalone-V2
          path: android/app/build/outputs/apk/release/app-release.apk