name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild
        # This creates the android folder with New Arch enabled
        run: npx expo prebuild --platform android --clean

      - name: 6. Build Standalone Release APK
        # We let Gradle handle the bundling automatically here
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 7. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: ADHD-Manager-NewArch-Success
          path: android/app/build/outputs/apk/release/app-release.apk