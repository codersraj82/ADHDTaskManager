name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild Android Folder
        run: npx expo prebuild --platform android

      - name: 6. Build Standalone Release APK
        run: |
          cd android
          chmod +x gradlew
          # This command builds a Release APK but uses the Debug key so it's "Standalone"
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug

      - name: 7. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdhdApp-Standalone
          path: android/app/build/outputs/apk/release/app-release.apk