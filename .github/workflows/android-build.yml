name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 6. Brute Force Bundle (Standalone Fix)
        # We now point specifically to the index.js we created
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: 7. Build Standalone Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug

      - name: 8. Upload Working APK
        uses: actions/upload-artifact@v4
        with:
          name: ADHD-Manager-Final-Build
          path: android/app/build/outputs/apk/release/app-release.apk