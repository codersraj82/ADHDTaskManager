name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild Android Folder
        run: npx expo prebuild --platform android

      - name: 6. Force Expo Bundle (The Red Screen Fix)
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --dest android/app/src/main/assets

      - name: 7. Build Standalone Release APK
        run: |
          cd android
          chmod +x gradlew
          # Build Release APK using the Debug key so it's easy to install locally
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug

      - name: 8. Upload Standalone APK
        uses: actions/upload-artifact@v4
        with:
          name: ADHD-TaskManager-Final
          path: android/app/build/outputs/apk/release/app-release.apk