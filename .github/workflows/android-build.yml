name: GitHub Actions Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. Install Dependencies
        run: npm install

      - name: 5. Prebuild Android Folder
        run: npx expo prebuild --platform android

      - name: 6. Force JS Bundle into Assets (Failsafe)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: 7. Build Release APK (Signed as Debug)
        run: |
          cd android
          chmod +x gradlew
          # This forces a production-ready "Bake" but allows it to run on your phone without a pro key
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug

      - name: 8. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdhdApp-Final-Standalone
          path: android/app/build/outputs/apk/release/app-release.apk